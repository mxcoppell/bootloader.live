/* ─── Reset & Base ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ─── Navigation Bar ─────────────────────────────────── */
.nav-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 4vw, 48px);
    background: var(--toolbar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--toolbar-border);
    z-index: 1000;
    transition: background 0.3s;
}

.nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--text-primary);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
}

.nav-logo .logo-icon {
    font-size: 20px;
    line-height: 1;
    display: inline-block;
    position: relative;
    transition: transform 0.3s ease, filter 0.3s ease;
}

/* Exhaust trails via pseudo-elements */
.nav-logo .logo-icon::before,
.nav-logo .logo-icon::after {
    content: '';
    position: absolute;
    height: 2px;
    width: 0;
    opacity: 0;
    border-radius: 1px;
    transform: rotate(-45deg);
    transform-origin: right center;
    pointer-events: none;
}

.nav-logo .logo-icon::before {
    bottom: 2px;
    left: -6px;
    background: linear-gradient(to left, rgba(255, 160, 50, 0.9), rgba(255, 100, 0, 0.4), transparent);
}

.nav-logo .logo-icon::after {
    bottom: 6px;
    left: -3px;
    background: linear-gradient(to left, rgba(255, 200, 80, 0.8), rgba(255, 120, 0, 0.3), transparent);
}

.nav-logo:hover .logo-icon::before {
    animation: streak-1 0.8s ease-out infinite;
}

.nav-logo:hover .logo-icon::after {
    animation: streak-2 0.6s ease-out infinite 0.2s;
}

.nav-logo:hover .logo-icon {
    animation: rocket-drift 2s ease-in-out infinite;
    filter: drop-shadow(0 1px 4px rgba(255, 140, 0, 0.3));
}

@keyframes rocket-drift {
    0%   { transform: translate(0, 0); }
    50%  { transform: translate(1px, -1px); }
    100% { transform: translate(0, 0); }
}

@keyframes streak-1 {
    0%   { width: 0; opacity: 0; }
    40%  { opacity: 0.9; }
    100% { width: 20px; opacity: 0; }
}

@keyframes streak-2 {
    0%   { width: 0; opacity: 0; }
    40%  { opacity: 0.7; }
    100% { width: 14px; opacity: 0; }
}

.nav-logo .logo-icon .streak-3 {
    position: absolute;
    bottom: -1px;
    left: -8px;
    height: 2px;
    width: 0;
    opacity: 0;
    border-radius: 1px;
    background: linear-gradient(to left, rgba(255, 140, 30, 0.7), rgba(255, 80, 0, 0.3), transparent);
    transform: rotate(-45deg);
    transform-origin: right center;
    pointer-events: none;
}

.nav-logo:hover .logo-icon .streak-3 {
    animation: streak-3 0.7s ease-out infinite 0.4s;
}

@keyframes streak-3 {
    0%   { width: 0; opacity: 0; }
    40%  { opacity: 0.6; }
    100% { width: 16px; opacity: 0; }
}

.nav-actions {
    display: flex;
    align-items: center;
    gap: 4px;
}

.nav-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
}

.nav-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-btn svg { width: 18px; height: 18px; }

/* ─── Back Button ────────────────────────────────────── */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 0;
    transition: color 0.15s;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
}

.back-btn:hover { color: var(--accent-color); }
.back-btn svg { width: 16px; height: 16px; }

/* ─── Landing Page ───────────────────────────────────── */
.landing-view {
    max-width: 960px;
    margin: 0 auto;
    padding: 120px clamp(20px, 4vw, 40px) 80px;
}

.hero { margin-bottom: 64px; }

.hero-title {
    font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
    font-size: clamp(2.4rem, 5vw, 3.2rem);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: var(--text-primary);
}

.hero-subtitle {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text-secondary);
}

/* ─── Post List ──────────────────────────────────────── */
.posts-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.post-card {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 24px 0;
    border-bottom: 1px solid var(--border-subtle);
    transition: opacity 0.15s;
}

.post-card:first-child { border-top: 1px solid var(--border-subtle); }
.post-card:hover { opacity: 0.75; }

.post-card-date {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
}

.post-card-title {
    font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
    font-size: 1.35rem;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
}

.post-card-excerpt {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.post-card-tags {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.post-tag {
    font-size: 12px;
    color: var(--text-muted);
    padding: 2px 8px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
}

/* ─── Post View ──────────────────────────────────────── */
.post-view {
    display: none;
    max-width: 960px;
    margin: 0 auto;
    padding: 100px clamp(20px, 4vw, 40px) 80px;
}

.post-view.active { display: block; }
.landing-view.hidden { display: none; }

.post-header {
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border-subtle);
}

.post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text-muted);
}

.post-meta-dot { opacity: 0.4; }

.post-title {
    font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
    font-size: clamp(2rem, 4.5vw, 2.6rem);
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.02em;
}

/* ─── Article Content (mdp-matching exactly) ─────────── */
.post-content .markdown-body {
    background: transparent !important;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    word-wrap: break-word;
}

.post-content .markdown-body > h1:first-child { display: none; }

.post-content .markdown-body h1, .post-content .markdown-body h2,
.post-content .markdown-body h3, .post-content .markdown-body h4,
.post-content .markdown-body h5, .post-content .markdown-body h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
    scroll-margin-top: 70px;
}

.post-content .markdown-body h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-subtle); }
.post-content .markdown-body h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border-subtle); }
.post-content .markdown-body h3 { font-size: 1.25em; }
.post-content .markdown-body h4 { font-size: 1em; }
.post-content .markdown-body h5 { font-size: 0.875em; }
.post-content .markdown-body h6 { font-size: 0.85em; color: var(--text-secondary); }

.post-content .markdown-body p { margin-top: 0; margin-bottom: 16px; }
.post-content .markdown-body a { color: var(--link-color); text-decoration: none; }
.post-content .markdown-body a:hover { text-decoration: underline; }
.post-content .markdown-body strong { font-weight: 600; }
.post-content .markdown-body em { font-style: italic; }
.post-content .markdown-body del { color: var(--text-secondary); }

.post-content .markdown-body blockquote {
    margin: 0 0 16px;
    padding: 0 1em;
    color: var(--text-secondary);
    border-left: 3px solid var(--border-color);
}

.post-content .markdown-body ul, .post-content .markdown-body ol {
    margin-top: 0;
    margin-bottom: 16px;
    padding-left: 2em;
}

.post-content .markdown-body li + li { margin-top: 4px; }

.post-content .markdown-body hr {
    height: 2px;
    padding: 0;
    margin: 24px 0;
    background-color: var(--border-subtle);
    border: 0;
}

.post-content .markdown-body img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
}

/* Tables - forced colors to beat CDN github-markdown.css */
.post-content .markdown-body table { border-collapse: collapse; border-spacing: 0; width: 100%; margin-bottom: 16px; overflow: auto; display: block; }
.post-content .markdown-body table th, .post-content .markdown-body table td { padding: 6px 13px; }

[data-theme="dark"] .post-content .markdown-body table th,
[data-theme="dark"] .post-content .markdown-body table td { border: 1px solid #21262d !important; color: #e6edf3 !important; }
[data-theme="dark"] .post-content .markdown-body table th { font-weight: 600; background: #313131 !important; }
[data-theme="dark"] .post-content .markdown-body table tr { background: #222222 !important; }

// ─── Theme Management ───────────────────────────────────
function getTheme() {
    return localStorage.getItem('blog-theme') || 'dark';
}

function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('blog-theme', theme);

    const moonIcon = document.getElementById('theme-icon-moon');
    const sunIcon = document.getElementById('theme-icon-sun');

    if (theme === 'light') {
        moonIcon.style.display = 'none';
        sunIcon.style.display = 'block';
        document.getElementById('hljs-theme-dark').disabled = true;
        document.getElementById('hljs-theme-light').disabled = false;
    } else {
        moonIcon.style.display = 'block';
        sunIcon.style.display = 'none';
        document.getElementById('hljs-theme-dark').disabled = false;
        document.getElementById('hljs-theme-light').disabled = true;
    }

    // mermaid re-init happens inside renderMermaidDiagrams (matching mdp)
}

function toggleTheme() {
    const current = getTheme();
    setTheme(current === 'dark' ? 'light' : 'dark');
    if (currentView === 'post') {
        renderMermaidDiagrams();
        fixThemeColors();
    }
}

// ─── Mermaid Counter ────────────────────────────────────
var mermaidCounter = 0;

// ─── Markdown Rendering ─────────────────────────────────
function initMarked() {
    marked.use({ gfm: true, breaks: false });
}

// Extract mermaid blocks before markdown parsing, replace with placeholders
var mermaidStore = {};
var mermaidIdx = 0;

function extractMermaid(md) {
    mermaidStore = {};
    mermaidIdx = 0;
    return md.replace(/```mermaid\n([\s\S]*?)```/g, function(match, code) {
        var id = 'MERMAID_PLACEHOLDER_' + (mermaidIdx++);
        mermaidStore[id] = code.trim();
        return '<div class="mermaid-container" id="' + id + '"></div>';
    });
}

function renderMarkdown(md, basePath) {
    // Rewrite relative image paths
    var processed = md.replace(/!\[([^\]]*)\]\((?!http)([^)]+)\)/g, function(match, alt, src) {
        return '![' + alt + '](' + basePath + src + ')';
    });

    // Extract mermaid blocks before marked parsing
    processed = extractMermaid(processed);

    // Parse markdown (mermaid placeholders pass through as raw HTML)
    var html = marked.parse(processed);

    // Sanitize but preserve our mermaid placeholder divs
    html = DOMPurify.sanitize(html, {
        ADD_TAGS: ['div'],
        ADD_ATTR: ['class', 'style', 'id'],
        ALLOW_DATA_ATTR: true
    });

    return html;
}

// Wait for mermaid ESM to load
function waitForMermaid() {
    return new Promise(function(resolve) {
        if (typeof mermaid !== 'undefined' && window.mermaid) { resolve(); return; }
        window.addEventListener('mermaid-loaded', function() { resolve(); }, { once: true });
        // Timeout fallback
        setTimeout(resolve, 5000);
    });
}

// Render mermaid diagrams - matches mdp: direct SVG insertion
async function renderMermaidDiagrams() {
    await waitForMermaid();
    if (typeof mermaid === 'undefined') return;

    var effective = getTheme();
    mermaid.initialize({
        startOnLoad: false,
        theme: effective === 'dark' ? 'dark' : 'default',
        themeVariables: {
            background: 'transparent'
        },
        securityLevel: 'strict',
        logLevel: 'error'
    });

    var keys = Object.keys(mermaidStore);
    for (var i = 0; i < keys.length; i++) {
        var id = keys[i];
        var container = document.getElementById(id);
        if (!container) continue;
        var code = mermaidStore[id];
        var renderId = 'mermaid-' + i + '-' + Date.now();
        try {
            var result = await mermaid.render(renderId, code);
            container.textContent = '';
            container.insertAdjacentHTML('afterbegin', result.svg);
            container.classList.add('mermaid-rendered');
        } catch (e) {
            container.textContent = 'Mermaid error: ' + e.message;
            container.style.color = 'var(--text-muted)';
            container.style.fontSize = '13px';
        }
    }
}

// ─── Fix theme colors on rendered content ───────────────

// This forces correct colors on elements the CDN overrides.
function fixThemeColors() {
    var isDark = getTheme() === 'dark';
    var body = document.getElementById('post-body');
    if (!body) return;

    // Fix table rows
    body.querySelectorAll('table tr').forEach(function(tr, i) {
        if (i === 0 && tr.querySelector('th')) {
            // header row - handled by th styles
        } else {
            tr.style.backgroundColor = isDark
                ? (i % 2 === 0 ? '#222222' : '#2a2a2a')
                : (i % 2 === 0 ? '#f8f8f8' : '#f5f5f5');
        }
    });
    body.querySelectorAll('table th').forEach(function(th) {
        th.style.backgroundColor = isDark ? '#313131' : '#ebebeb';
        th.style.color = isDark ? '#e6edf3' : '#1f2328';
        th.style.borderColor = isDark ? '#21262d' : '#e8eaed';
    });
    body.querySelectorAll('table td').forEach(function(td) {
        td.style.color = isDark ? '#e6edf3' : '#1f2328';
        td.style.borderColor = isDark ? '#21262d' : '#e8eaed';
    });

    // Fix code blocks
    body.querySelectorAll('pre').forEach(function(pre) {
        pre.style.backgroundColor = isDark ? '#2a2a2a' : '#f5f5f5';
        pre.style.color = isDark ? '#e6edf3' : '#1f2328';
    });
    body.querySelectorAll('code').forEach(function(code) {
        if (!code.closest('pre')) {
            code.style.backgroundColor = isDark ? '#2a2a2a' : '#f5f5f5';
            code.style.color = isDark ? '#e6edf3' : '#1f2328';
        }
    });
}

// ─── TOC Generation ─────────────────────────────────────
function generateToc() {
    const headings = document.querySelectorAll('#post-body h2, #post-body h3, #post-body h4');
    const tocList = document.getElementById('toc-list');
    const tocToggle = document.getElementById('toc-toggle');

    tocList.textContent = '';

    if (headings.length < 3) {
        tocToggle.classList.remove('visible');
        return;
    }

    tocToggle.classList.add('visible');

    headings.forEach(function(heading, i) {
        var id = 'heading-' + i;
        heading.id = id;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = heading.textContent;
        a.className = 'toc-' + heading.tagName.toLowerCase();
        a.addEventListener('click', function(e) {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        tocList.appendChild(li);
    });
}

function toggleToc() {
    document.getElementById('toc-panel').classList.toggle('open');
}

// ─── Reading Progress ───────────────────────────────────
function updateReadingProgress() {
    if (currentView !== 'post') {
        document.getElementById('reading-progress').style.width = '0%';
        return;
    }
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var scrolled = window.scrollY;
    var progress = docHeight > 0 ? (scrolled / docHeight) * 100 : 0;
    document.getElementById('reading-progress').style.width = progress + '%';
}

// ─── Utilities ──────────────────────────────────────────
function readingTime(text) {
    var words = text.trim().split(/\s+/).length;
    return Math.ceil(words / 230) + ' min read';
}

function formatDate(dateStr) {
    var date = new Date(dateStr + 'T12:00:00');
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ─── Render Landing ─────────────────────────────────────
function renderLanding() {
    var list = document.getElementById('posts-list');
    list.textContent = '';

    POSTS.forEach(function(post) {
        var card = document.createElement('a');
        card.className = 'post-card';
        card.href = '#/post/' + post.slug;

        var dateDiv = document.createElement('div');
        dateDiv.className = 'post-card-date';
        dateDiv.textContent = formatDate(post.date);
        card.appendChild(dateDiv);

        var titleDiv = document.createElement('div');
        titleDiv.className = 'post-card-title';
        titleDiv.textContent = post.title;
        card.appendChild(titleDiv);

        var excerptDiv = document.createElement('div');
        excerptDiv.className = 'post-card-excerpt';
        excerptDiv.textContent = post.excerpt;
        card.appendChild(excerptDiv);

        var tagsDiv = document.createElement('div');
        tagsDiv.className = 'post-card-tags';
        post.tags.forEach(function(t) {
            var span = document.createElement('span');
            span.className = 'post-tag';
            span.textContent = t;
            tagsDiv.appendChild(span);
        });
        card.appendChild(tagsDiv);

        list.appendChild(card);
    });
}

// ─── Meta Tag Updates ───────────────────────────────────
function updateMetaTag(name, content, attr) {
    attr = attr || 'name';
    var selector = 'meta[' + attr + '="' + name + '"]';
    var el = document.querySelector(selector);
    if (el) {
        el.setAttribute('content', content);
    }
}

// ─── Navigation ─────────────────────────────────────────
var currentView = 'landing';
var postCache = {};

function showLanding() {
    currentView = 'landing';
    document.getElementById('landing-view').classList.remove('hidden');
    document.getElementById('post-view').classList.remove('active');
    document.getElementById('reading-progress').style.width = '0%';
    document.getElementById('toc-toggle').classList.remove('visible');
    document.getElementById('toc-panel').classList.remove('open');
    document.title = 'bootloader.live \u2014 AI Productivity';
    updateMetaTag('description', 'Practical writing on AI-assisted development, MCP tools, and developer productivity.');
    updateMetaTag('og:title', 'bootloader.live \u2014 AI Productivity', 'property');
    updateMetaTag('og:description', 'Practical writing on AI-assisted development, MCP tools, and developer productivity.', 'property');
    updateMetaTag('og:url', 'https://bootloader.live/', 'property');
    updateMetaTag('twitter:title', 'bootloader.live \u2014 AI Productivity');
    updateMetaTag('twitter:description', 'Practical writing on AI-assisted development, MCP tools, and developer productivity.');
    window.scrollTo(0, 0);
}

async function showPost(slug) {
    var post = POSTS.find(function(p) { return p.slug === slug; });
    if (!post) { showLanding(); return; }

    currentView = 'post';
    document.getElementById('landing-view').classList.add('hidden');
    document.getElementById('post-view').classList.add('active');

    document.getElementById('post-title').textContent = post.title;
    document.title = post.title + ' \u2014 bootloader.live';
    updateMetaTag('description', post.excerpt);
    updateMetaTag('og:title', post.title, 'property');
    updateMetaTag('og:description', post.excerpt, 'property');
    updateMetaTag('og:url', 'https://bootloader.live/#/post/' + post.slug, 'property');
    updateMetaTag('twitter:title', post.title);
    updateMetaTag('twitter:description', post.excerpt);

    var body = document.getElementById('post-body');
    body.textContent = '';
    var loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading';
    loadingDiv.textContent = 'Loading';
    body.appendChild(loadingDiv);

    var md;
    if (postCache[slug]) {
        md = postCache[slug];
    } else {
        try {
            var resp = await fetch('posts/' + slug + '/' + post.file);
            md = await resp.text();
            postCache[slug] = md;
        } catch (e) {
            body.textContent = '';
            var errP = document.createElement('p');
            errP.style.color = 'var(--text-muted)';
            errP.textContent = 'Failed to load post: ' + e.message;
            body.appendChild(errP);
            return;
        }
    }

    var metaEl = document.getElementById('post-meta');
    metaEl.textContent = '';
    var dateSpan = document.createElement('span');
    dateSpan.textContent = formatDate(post.date);
    metaEl.appendChild(dateSpan);
    var dotSpan = document.createElement('span');
    dotSpan.className = 'post-meta-dot';
    dotSpan.textContent = '\u00B7';
    metaEl.appendChild(dotSpan);
    var timeSpan = document.createElement('span');
    timeSpan.textContent = readingTime(md);
    metaEl.appendChild(timeSpan);

    var basePath = 'posts/' + slug + '/';
    var sanitizedHtml = renderMarkdown(md, basePath);

    body.textContent = '';
    var template = document.createElement('template');
    template.innerHTML = sanitizedHtml;
    body.appendChild(template.content);

    window.scrollTo(0, 0);

    await renderMermaidDiagrams();
    generateToc();
    fixThemeColors();

    document.querySelector('.post-content').classList.add('fade-in');
}

// ─── Handle Hash Changes ────────────────────────────────
function handleRoute() {
    var hash = location.hash || '#/';
    if (hash === '#/' || hash === '#' || hash === '') {
        showLanding();
    } else if (hash.startsWith('#/post/')) {
        var slug = hash.replace('#/post/', '');
        showPost(slug);
    } else {
        showLanding();
    }
}

// ─── Init ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    setTheme(getTheme());
    initMarked();

    // mermaid init happens in renderMermaidDiagrams (matching mdp)

    renderLanding();
    handleRoute();

    window.addEventListener('scroll', updateReadingProgress);

    // Event listeners
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('toc-toggle').addEventListener('click', toggleToc);
    document.getElementById('back-btn-top').addEventListener('click', function() { location.hash = '#/'; });
    document.getElementById('back-btn-bottom').addEventListener('click', function() { location.hash = '#/'; });

    document.addEventListener('click', function(e) {
        var panel = document.getElementById('toc-panel');
        var toggle = document.getElementById('toc-toggle');
        if (panel.classList.contains('open') && !panel.contains(e.target) && !toggle.contains(e.target)) {
            panel.classList.remove('open');
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            if (currentView === 'post') { location.hash = '#/'; }
            document.getElementById('toc-panel').classList.remove('open');
        }
    });
});

window.addEventListener('hashchange', handleRoute);
</script>
